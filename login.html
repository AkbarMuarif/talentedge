<body>

    <h2>Login to TalentEdge</h2>

        <input type="email" id="email" placeholder="Email" style="width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;">
        <input type="password" id="password" placeholder="Password" style="width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;">
        <button onclick="login()" class="btn" style="width: 100%; margin-top: 20px;">Login</button>
        <p>Don't have an account? <a href="register.html" style="color: #6366f1;">Register here</a></p>
    </div>
</section>
