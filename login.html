<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TalentEdge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">✨ TalentEdge</a>
    </div>
</nav>

<section class="auth-container">
    <div class="auth-card">
        <h1>Welcome Back! 👋</h1>
        <p class="auth-subtitle">Log in to your TalentEdge account</p>
        
        <form onsubmit="event.preventDefault(); login();" class="auth-form">
            <div class="form-group">
                <label for="email">Username</label>
                <input type="text" id="email" placeholder="your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>

        <div class="auth-divider">OR</div>

        <p class="auth-footer">
            Don't have an account? 
            <a href="register.html" class="link-primary">Sign up here</a>
        </p>
    </div>
</section>

<script type="module" src="auth.js"></script>

</body>
</html>
