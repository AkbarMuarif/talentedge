<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TalentEdge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">✨ TalentEdge</a>
    </div>
</nav>

<section class="auth-container">
    <div class="auth-card">
        <h1>Join the Movement 🚀</h1>
        <p class="auth-subtitle">Create your TalentEdge account to get started</p>
        
        <form onsubmit="event.preventDefault(); register();" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="email">Username</label>
                <input type="text" id="email" placeholder="your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>

        <div class="auth-divider">OR</div>

        <p class="auth-footer">
            Already have an account? 
            <a href="login.html" class="link-primary">Login here</a>
        </p>
    </div>
</section>

<script type="module" src="auth.js"></script>

</body>
</html>
